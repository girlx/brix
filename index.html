<head>
    <title>Juice Weight & Volume Calculator</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #3f316b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .calculator {
            width: 360px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .display {
            background-color: #ede9f3;
            padding: 30px 20px 10px;
            font-size: 48px;
            font-weight: 500;
            color: #5c4684;
            text-align: right;
            height: 140px;
            box-sizing: border-box;
            position: relative;
        }
        .display input {
            font-size: 48px;
            font-weight: 500;
            color: #5c4684;
            background: none;
            border: none;
            outline: none;
            width: 100%;
            text-align: right;
        }
        .wave {
            height: 24px;
            background: linear-gradient(to right, #a088e6, #765ac5);
        }
        .results {
            background-color: #6b4dc4;
            padding: 20px;
            color: white;
            font-size: 15px;
        }
        .results div {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
        }
        .results label {
            color: #ddd;
        }
        .results span {
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>

        function calculate() {
            const brix = parseFloat(document.getElementById("brixInput").value);
            const row = brixData[brix];
            if (!row) return;

            const sg = row.SpecificGravity;
            const lbsSolid = row.LbsSolidPerGallon;
            const totalLbsPerGal = sg * 8.34;
            const solidLbsPerMT = (2204.62 * lbsSolid) / totalLbsPerGal;
            const gallonsPerMT = 2204.62 / totalLbsPerGal;
            const kgsSolid = lbsSolid * 0.453592;
            const totalKgs = totalLbsPerGal * 0.453592;
            const solidKgsPerMT = solidLbsPerMT * 0.453592;

            document.getElementById("specificGravity").innerText = sg.toFixed(5);
            document.getElementById("lbsSolidPerGal").innerText = lbsSolid.toFixed(4);
            document.getElementById("totalLbsPerGal").innerText = totalLbsPerGal.toFixed(4);
            document.getElementById("solidLbsPerMT").innerText = solidLbsPerMT.toFixed(4);
            document.getElementById("gallonsPerMT").innerText = gallonsPerMT.toFixed(4);
            document.getElementById("kgsSolidPerGal").innerText = kgsSolid.toFixed(4);
            document.getElementById("totalKgsPerGal").innerText = totalKgs.toFixed(4);
            document.getElementById("solidKgsPerMT").innerText = solidKgsPerMT.toFixed(4);
        }

        window.onload = calculate;
    </script>
